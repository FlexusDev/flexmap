    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <polygon points="50,10 20,90 80,90" fill="url(#beamGradient)" />
  <polygon points="35,50 40,80 30,80" fill="#6366f1" opacity="0.6" />
  <polygon points="65,50 60,80 70,80" fill="#6366f1" opacity="0.6" />
</svg>
